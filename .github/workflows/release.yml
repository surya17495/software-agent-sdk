name: release

# Release automation via OpenHands/release-actions (release-please).
#
# This caller owns the trigger; the reusable workflow owns the logic. On every
# push to main (or a release/** maintenance branch) release-please maintains a
# DRAFT `chore(main): release X.Y.Z` PR — kept a draft by
# `draft-pull-request: true` in release-please-config.json. Merging that PR tags
# `vX.Y.Z` and publishes the GitHub release, which in turn fires
# pypi-release.yml and release-binaries.yml (both trigger on release: published).
#
# The version is derived from Conventional Commit PR titles since the last
# release (`fix` -> patch, `feat` -> minor, breaking -> major); pr.yml enforces
# those titles.
on:
  push:
    branches:
      - main
      # Maintenance / freeze branches (e.g. release/1.29). The reusable workflow
      # scopes the release to whichever branch triggered this run.
      - 'release/**'

jobs:
  release-please:
    # The caller must grant the permissions the reusable workflow needs; the
    # effective token is the intersection of the two.
    permissions:
      contents: write
      pull-requests: write
    # Passes the org-level RELEASE_APP_ID / RELEASE_APP_PRIVATE_KEY through so
    # the reusable workflow can mint the GitHub App token (already set up
    # org-wide — nothing to configure per-repo).
    secrets: inherit
    uses: OpenHands/release-actions/.github/workflows/release-please.yml@v0.2.0
